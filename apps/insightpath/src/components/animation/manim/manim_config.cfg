[CLI]
# Manim configuration for Server Technologies Module
# Optimized settings for educational content

# Output settings
output_file = module_3_1_server_technologies
media_dir = ./media
video_dir = ./media/videos
images_dir = ./media/images

# Quality settings for different use cases
# Use these with: manim scene.py SceneName --quality=high

[high]
# Production quality - 4K 60fps
pixel_height = 2160
pixel_width = 3840
frame_rate = 60

[medium]
# Development/preview quality - 1080p 30fps
pixel_height = 1080
pixel_width = 1920
frame_rate = 30

[low]
# Fast preview quality - 720p 30fps
pixel_height = 720
pixel_width = 1280
frame_rate = 30

[preview]
# Fastest preview - 480p 15fps
pixel_height = 480
pixel_width = 854
frame_rate = 15
preview = True

# Educational content optimizations
[educational]
# Optimized for educational content with clear text
pixel_height = 1080
pixel_width = 1920
frame_rate = 30
background_color = "#1a1a2e"
text_font = "Arial"
tex_font = "Computer Modern"

# Color theme settings
[colors]
# Module 3 color scheme
primary = "#0066CC"
secondary = "#4A90E2"
accent = "#F5A623"
background = "#1a1a2e"
text = "#FFFFFF"

# Performance settings
[performance]
# Optimize for smooth playback
disable_caching = False
write_to_movie = True
save_pngs = False
transparent = False
save_as_gif = False

# Logging
verbosity = INFO
notify_outdated_version = False